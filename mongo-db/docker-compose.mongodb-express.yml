version: '3.8'

services:
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://admin:admin@host.docker.internal:27017/gethired_dev?connectTimeoutMS=60000&ssl=false
      - ME_CONFIG_OPTIONS_EDITORTHEME=ambiance
      - ME_CONFIG_BASICAUTH=false
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mongo-network

networks:
  mongo-network:
    driver: bridge